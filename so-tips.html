<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Manager by S&O Racing</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1b3b6a;--navy2:#2a5298;--blue-light:#e8eef7;
  --gold:#c8972a;--gold2:#f5c842;--red:#c0392b;--green:#1e7a4a;
  --ink:#0d1f35;--muted:#5a7090;--border:#b8cce0;--bg:#f0f4f9;--white:#ffffff;
  --shadow:0 2px 12px rgba(27,59,106,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;min-height:100vh;font-size:14px;}

/* NAV */
nav{background:var(--navy);padding:0 14px 0 10px;display:flex;align-items:center;gap:10px;justify-content:space-between;border-bottom:3px solid var(--gold);box-shadow:0 2px 16px rgba(0,0,0,0.25);position:sticky;top:0;z-index:100;height:54px;}
.brand{font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-weight:700;color:var(--gold2);}
.nav-actions{display:flex;gap:8px;align-items:center;}
.gs-status{font-size:0.57rem;letter-spacing:1px;padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.45);cursor:pointer;transition:all 0.15s;}
.gs-status:hover{border-color:var(--gold2);color:var(--gold2);}
.gs-status.connected{border-color:#6dda9e;color:#6dda9e;}
.gs-status.connecting{border-color:var(--gold2);color:var(--gold2);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

/* LAYOUT */
.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 54px);}

/* SIDEBAR */
.sidebar{background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-tab{flex:1;padding:10px 4px;font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s;}
.sidebar-tab:hover{color:var(--navy2);}
.sidebar-tab.active{color:var(--navy);border-bottom-color:var(--navy);}
.tab-count{display:inline-block;background:var(--blue-light);border-radius:10px;padding:1px 6px;font-size:0.49rem;margin-left:3px;color:var(--navy2);}
.sidebar-tab.active .tab-count{background:var(--navy);color:#fff;}
.sidebar-body{flex:1;overflow-y:auto;padding:10px 9px;}
.tab-totals{display:flex;justify-content:space-around;padding:7px 8px;background:var(--blue-light);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-total-item{text-align:center;flex:1;}
.tab-total-val{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;line-height:1;}
.tab-total-lbl{font-size:0.48rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:1px;}
.tt-green{color:var(--green);}
.tt-gold{color:var(--gold);}
.tt-red{color:var(--red);}
.tt-navy{color:var(--navy);}
.tt-divider{width:1px;background:var(--border);margin:4px 0;}
.section-label{font-size:0.52rem;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding:5px 3px 7px;display:flex;align-items:center;gap:7px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.date-group-label{font-size:0.57rem;color:var(--muted);padding:7px 3px 3px;letter-spacing:1px;}

/* SIDEBAR MEETING CARD */
.meeting-item{padding:9px 10px;border-radius:3px;cursor:pointer;border:1px solid transparent;border-left:3px solid transparent;margin-bottom:4px;transition:all 0.15s;}
.meeting-item:hover{background:var(--blue-light);border-color:var(--border);border-left-color:var(--border);}
.meeting-item.active{background:var(--blue-light);border-color:var(--navy2);border-left-color:var(--navy2);}
.meeting-item.is-today{border-left-color:var(--gold)!important;}
.meeting-item.is-future{border-left-color:var(--navy2)!important;}
.meeting-item.is-past{border-left-color:var(--border)!important;}
.sb-venue{font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:5px;flex-wrap:wrap;line-height:1.2;}
.today-pill{font-size:0.47rem;letter-spacing:1px;text-transform:uppercase;background:var(--gold);color:#fff;padding:1px 5px;border-radius:10px;font-family:'DM Mono',monospace;}
.sb-meta{font-size:0.58rem;color:var(--muted);margin-top:2px;}

/* MINI STATS ROW in sidebar card */
.sb-stats{display:flex;gap:8px;margin-top:5px;align-items:center;}
.sb-stat{font-size:0.58rem;font-weight:500;}
.sb-stat.w{color:var(--green);}
.sb-stat.p{color:var(--gold);}
.sb-stat.u{color:var(--red);}
.sb-stat.pct{color:var(--navy2);margin-left:auto;font-size:0.62rem;font-weight:600;}
.sb-bar{height:3px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden;}
.sb-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--navy2),var(--gold));}
.gs-indicator{font-size:0.52rem;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:3px;}
.gs-dot{width:4px;height:4px;border-radius:50%;background:var(--border);flex-shrink:0;}
.no-meetings{font-size:0.66rem;color:var(--muted);text-align:center;padding:24px 6px;line-height:2;}

/* MAIN */
.main{padding:22px 26px;overflow-y:auto;max-height:calc(100vh - 54px);}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;text-align:center;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:14px;opacity:0.4;}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;color:var(--navy);margin-bottom:8px;}
.empty-sub{font-size:0.67rem;letter-spacing:1px;line-height:1.8;}

/* MEETING HEADER */
.meeting-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.meeting-title{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:700;color:var(--navy);line-height:1;}
.meeting-subtitle{font-size:0.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}

/* SUMMARY BAR */
.summary-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.summary-chip{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:9px 16px;text-align:center;min-width:78px;box-shadow:var(--shadow);}
.chip-val{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;line-height:1;}
.chip-label{font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:3px;}
.chip-navy{color:var(--navy);}
.chip-green{color:var(--green);}
.chip-gold{color:var(--gold);}
.chip-red{color:var(--red);}

/* GS BANNER */
.gs-banner{background:var(--blue-light);border:1px solid var(--border);border-left:3px solid var(--navy2);border-radius:3px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:0.62rem;color:var(--muted);}
.gs-banner strong{color:var(--navy);}

/* RACE BLOCK */
.race-block{background:var(--white);border:1px solid var(--border);border-radius:4px;margin-bottom:9px;box-shadow:var(--shadow);overflow:hidden;}
.picks-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.col-type{width:145px;}
.col-num{width:80px;}
.col-result{/* fills remaining */}

.picks-table thead tr{background:var(--navy);}
.picks-table thead th{font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.45);text-align:left;padding:8px 10px;border:none;font-weight:400;}
.th-race{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;color:var(--gold2);letter-spacing:0;text-transform:none;padding:7px 10px!important;vertical-align:middle;width:130px;}
.race-name-input{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.85);font-family:'DM Mono',monospace;font-size:0.68rem;padding:2px 4px;width:100%;outline:none;}
.race-name-input::placeholder{color:rgba(255,255,255,0.28);}
.race-name-input:focus{border-bottom-color:var(--gold2);}
.race-settled-badge{font-size:0.5rem;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:rgba(30,122,74,0.25);color:#6dda9e;display:none;}
.race-settled-badge.show{display:inline-block;}

.picks-table tbody td{padding:8px 10px;border-bottom:1px solid rgba(184,204,224,0.3);vertical-align:middle;}
.picks-table tbody tr:last-child td{border-bottom:none;}
.picks-table tbody tr:hover td{background:var(--blue-light);}

.pick-type{display:inline-block;padding:3px 7px;border-radius:2px;font-size:0.56rem;letter-spacing:0.5px;text-transform:uppercase;font-weight:500;white-space:nowrap;width:100%;text-align:center;}
.pt-0{background:rgba(27,59,106,0.12);color:var(--navy);border:1px solid rgba(27,59,106,0.2);}
.pt-1{background:rgba(200,151,42,0.12);color:var(--gold);border:1px solid rgba(200,151,42,0.3);}
.pt-2{background:rgba(90,112,144,0.1);color:var(--muted);border:1px solid rgba(90,112,144,0.2);}

.horse-num-input{background:transparent;border:none;border-bottom:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;color:var(--navy);padding:2px 4px;width:100%;outline:none;text-align:center;transition:border-color 0.15s;}
.horse-num-input:focus{border-bottom-color:var(--navy2);}
.horse-num-input::placeholder{font-weight:400;font-size:0.65rem;color:#b0bec5;font-family:'DM Mono',monospace;}
.horse-name-input{background:transparent;border:none;border-bottom:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-weight:600;color:var(--ink);padding:2px 4px;width:100%;outline:none;transition:border-color 0.15s;}
.horse-name-input:focus{border-bottom-color:var(--navy2);}
.horse-name-input::placeholder{font-weight:400;font-size:0.73rem;color:#b0bec5;font-family:'DM Mono',monospace;}

.result-group{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.res-btn{padding:4px 7px;font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:1px;border-radius:2px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all 0.12s;white-space:nowrap;}
.res-btn:hover{border-color:var(--navy2);color:var(--navy2);}
.res-btn.r1{background:var(--green);border-color:var(--green);color:#fff;}
.res-btn.r2{background:var(--gold);border-color:var(--gold);color:#fff;}
.res-btn.r3{background:#7a5c2a;border-color:#7a5c2a;color:#fff;}
.res-btn.runp{background:var(--red);border-color:var(--red);color:#fff;}

/* ADD RACE BUTTON inline at bottom */
.add-race-row{text-align:center;padding:10px;border-top:1px dashed var(--border);background:var(--bg);}

/* BUTTONS */
.btn{padding:8px 16px;font-family:'DM Mono',monospace;font-size:0.61rem;letter-spacing:2px;text-transform:uppercase;border-radius:2px;cursor:pointer;transition:all 0.15s;border:none;white-space:nowrap;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy2);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--navy2);color:var(--navy2);}
.btn-gold{background:var(--gold);color:#fff;}
.btn-gold:hover{background:#b07820;}
.btn-sm{padding:5px 11px;font-size:0.57rem;}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);}
.btn-danger:hover{background:rgba(192,57,43,0.06);}
.btn-ghost{background:transparent;border:1px dashed var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--navy2);color:var(--navy2);}
.btn-disabled{opacity:0.4;cursor:not-allowed;}

/* DASHBOARD */
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.dash-title{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-weight:700;color:var(--navy);}
.dash-date{font-size:0.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
.dash-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:3px;overflow:hidden;}
.dash-toggle-btn{padding:6px 14px;font-family:'DM Mono',monospace;font-size:0.57rem;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all 0.15s;}
.dash-toggle-btn.active{background:var(--navy);color:#fff;}

/* DASHBOARD STAT STRIP */
.dash-stats{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.dash-chip{background:var(--white);border:1px solid var(--border);border-radius:3px;padding:10px 18px;text-align:center;min-width:90px;box-shadow:var(--shadow);}
.dash-chip-val{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;line-height:1;}
.dash-chip-lbl{font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:3px;}

/* MEETING SUMMARY CARD on dashboard */
.dash-meeting-card{background:var(--white);border:1px solid var(--border);border-radius:4px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow);}
.dash-card-head{background:var(--navy);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.dash-card-venue{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:700;color:var(--gold2);}
.dash-card-meta{font-size:0.57rem;color:rgba(255,255,255,0.5);margin-top:2px;}
.dash-card-score{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:#fff;text-align:right;}
.dash-card-score-lbl{font-size:0.5rem;color:rgba(255,255,255,0.45);letter-spacing:1px;text-transform:uppercase;}

.dash-race-row{padding:8px 14px;border-bottom:1px solid rgba(184,204,224,0.3);display:flex;align-items:flex-start;gap:10px;}
.dash-race-row:last-child{border-bottom:none;}
.dash-race-num{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:700;color:var(--navy);min-width:28px;}
.dash-race-name{font-size:0.6rem;color:var(--muted);margin-bottom:4px;}
.dash-picks-row{display:flex;gap:8px;flex-wrap:wrap;}

/* PICK ICON CHIP */
.pick-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:0.6rem;font-family:'DM Mono',monospace;border:1px solid var(--border);background:var(--bg);}
.pick-chip.pending{color:var(--muted);}
.pick-chip.res-1st{background:rgba(30,122,74,0.1);border-color:rgba(30,122,74,0.3);color:var(--green);}
.pick-chip.res-2nd{background:rgba(200,151,42,0.1);border-color:rgba(200,151,42,0.3);color:var(--gold);}
.pick-chip.res-3rd{background:rgba(122,92,42,0.1);border-color:rgba(122,92,42,0.25);color:#7a5c2a;}
.pick-chip.res-unp{background:rgba(192,57,43,0.07);border-color:rgba(192,57,43,0.2);color:var(--red);}
.pick-icon{font-size:0.85rem;line-height:1;}
.pick-label{font-size:0.52rem;letter-spacing:1px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(13,31,53,0.55);z-index:200;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border:1px solid var(--border);border-top:4px solid var(--navy);border-radius:4px;padding:26px;max-width:480px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,0.2);max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:700;color:var(--navy);margin-bottom:18px;}
label{display:block;font-size:0.56rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;margin-top:13px;}
label:first-of-type{margin-top:0;}
input[type=text],input[type=date],input[type=number],select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:2px;color:var(--ink);font-family:'DM Mono',monospace;font-size:0.8rem;padding:8px 10px;outline:none;transition:border-color 0.15s;}
input:focus,select:focus{border-color:var(--navy2);}
.info-box{background:var(--blue-light);border:1px solid var(--border);border-radius:3px;padding:11px 13px;font-size:0.63rem;color:var(--muted);line-height:1.8;margin-top:13px;}
.info-box strong{color:var(--navy);}
.modal-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:20px;}

/* VENUE AUTOCOMPLETE */
.venue-wrap{position:relative;}
.venue-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--white);border:1px solid var(--border);border-top:none;border-radius:0 0 3px 3px;max-height:200px;overflow-y:auto;z-index:300;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.12);}
.venue-dropdown.open{display:block;}
.venue-option{padding:8px 11px;font-size:0.76rem;cursor:pointer;border-bottom:1px solid rgba(184,204,224,0.25);color:var(--ink);}
.venue-option:last-child{border-bottom:none;}
.venue-option:hover{background:var(--blue-light);}
.state-tag{font-size:0.53rem;color:var(--muted);margin-left:6px;letter-spacing:1px;}
.venue-option.other-opt{color:var(--navy2);font-style:italic;}

/* ── HAMBURGER ── */
.hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;background:transparent;border:none;cursor:pointer;padding:6px;}
.hamburger span{display:block;width:22px;height:2px;background:rgba(255,255,255,0.85);border-radius:2px;}

/* ── DRAWER ── */
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(13,31,53,0.5);z-index:150;}
.drawer-overlay.open{display:block;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:290px;background:var(--white);z-index:160;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform 0.26s ease;box-shadow:4px 0 24px rgba(0,0,0,0.18);}
.drawer.open{transform:translateX(0);}
.drawer-head{background:var(--navy);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);flex-shrink:0;}
.drawer-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--gold2);}
.drawer-close{background:transparent;border:none;color:rgba(255,255,255,0.7);font-size:1.3rem;cursor:pointer;padding:2px 8px;line-height:1;}
.drawer .tab-totals{flex-shrink:0;}
.drawer .sidebar-body{flex:1;overflow-y:auto;padding:10px 9px;}

/* ── MOBILE RACE CARD ── */
.mobile-race-block{background:var(--white);border:1px solid var(--border);border-radius:4px;margin-bottom:9px;box-shadow:var(--shadow);overflow:hidden;}
.mobile-race-head{background:var(--navy);padding:9px 13px;display:flex;align-items:center;gap:10px;}
.mobile-race-num{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:700;color:var(--gold2);white-space:nowrap;}
.mobile-race-name-input{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.85);font-family:'DM Mono',monospace;font-size:0.68rem;padding:2px 4px;flex:1;outline:none;min-width:0;}
.mobile-race-name-input::placeholder{color:rgba(255,255,255,0.28);}
.mobile-race-name-input:focus{border-bottom-color:var(--gold2);}
.mobile-race-badge{font-size:0.5rem;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:20px;background:rgba(30,122,74,0.25);color:#6dda9e;display:none;white-space:nowrap;margin-left:auto;}
.mobile-race-badge.show{display:inline-block;}
.mobile-pick{padding:10px 13px;border-bottom:1px solid rgba(184,204,224,0.3);}
.mobile-pick:last-child{border-bottom:none;}
.mobile-pick-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.mobile-pick-fields{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.mobile-num-input{background:transparent;border:none;border-bottom:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--navy);padding:2px 4px;width:50px;outline:none;text-align:center;flex-shrink:0;}
.mobile-num-input:focus{border-bottom-color:var(--navy2);}
.mobile-num-input::placeholder{font-weight:400;font-size:0.65rem;color:#b0bec5;font-family:'DM Mono',monospace;}

.mobile-result-group.has-clear{grid-template-columns:1fr 1fr 1fr 1fr 40px;}
.mobile-res-btn{padding:11px 4px;font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:1px;border-radius:3px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);text-align:center;transition:all 0.1s;}

@media(max-width:900px){
  .hamburger{display:flex;}
  .layout{grid-template-columns:1fr;}
  .sidebar{display:none;}
  .main{padding:14px 12px;max-height:none;}
  .gs-status{display:none;}
  .summary-bar{gap:7px;}
  .summary-chip{min-width:68px;padding:8px 10px;}

  /* hide desktop race table, show mobile cards */
  .race-block{display:none;}
  .mobile-race-block{display:block;}
}

  .mobile-race-block{display:none;}
  .drawer{display:none!important;}
  .drawer-overlay{display:none!important;}
}

  .summary-chip{min-width:56px;padding:7px 8px;}
  .chip-val{font-size:1.1rem;}
  .chip-label{font-size:0.45rem;}
}

.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);border-left:3px solid var(--gold2);color:#fff;padding:11px 16px;border-radius:2px;font-size:0.68rem;letter-spacing:1px;opacity:0;transform:translateY(20px);transition:all 0.25s;z-index:999;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}

<div class="toast" id="toast"></div>

<script>
// ── VENUES ──────────────────────────────────────────
const VENUES=[
  {n:'Flemington',s:'VIC'},{n:'Caulfield',s:'VIC'},{n:'Moonee Valley',s:'VIC'},
  {n:'Sandown Hillside',s:'VIC'},{n:'Sandown Lakeside',s:'VIC'},{n:'Cranbourne',s:'VIC'},
  {n:'Mornington',s:'VIC'},{n:'Pakenham',s:'VIC'},{n:'Geelong',s:'VIC'},
  {n:'Ballarat',s:'VIC'},{n:'Bendigo',s:'VIC'},{n:'Echuca',s:'VIC'},
  {n:'Seymour',s:'VIC'},{n:'Sale',s:'VIC'},{n:'Warrnambool',s:'VIC'},
  {n:'Hamilton',s:'VIC'},{n:'Horsham',s:'VIC'},{n:'Stawell',s:'VIC'},
  {n:'Randwick',s:'NSW'},{n:'Rosehill Gardens',s:'NSW'},{n:'Warwick Farm',s:'NSW'},
  {n:'Canterbury',s:'NSW'},{n:'Kembla Grange',s:'NSW'},{n:'Newcastle',s:'NSW'},
  {n:'Hawkesbury',s:'NSW'},{n:'Gosford',s:'NSW'},{n:'Wyong',s:'NSW'},
  {n:'Goulburn',s:'NSW'},{n:'Wagga Wagga',s:'NSW'},{n:'Albury',s:'NSW'},
  {n:'Orange',s:'NSW'},{n:'Dubbo',s:'NSW'},{n:'Tamworth',s:'NSW'},
  {n:'Lismore',s:'NSW'},{n:'Grafton',s:'NSW'},{n:'Coffs Harbour',s:'NSW'},
  {n:'Eagle Farm',s:'QLD'},{n:'Doomben',s:'QLD'},{n:'Gold Coast',s:'QLD'},
  {n:'Sunshine Coast',s:'QLD'},{n:'Ipswich',s:'QLD'},{n:'Toowoomba',s:'QLD'},
  {n:'Rockhampton',s:'QLD'},{n:'Townsville',s:'QLD'},{n:'Cairns',s:'QLD'},
  {n:'Mackay',s:'QLD'},{n:'Roma',s:'QLD'},
  {n:'Morphettville',s:'SA'},{n:'Gawler',s:'SA'},{n:'Murray Bridge',s:'SA'},
  {n:'Oakbank',s:'SA'},{n:'Mount Gambier',s:'SA'},{n:'Port Augusta',s:'SA'},
  {n:'Ascot',s:'WA'},{n:'Belmont Park',s:'WA'},{n:'Bunbury',s:'WA'},
  {n:'Pinjarra',s:'WA'},{n:'Northam',s:'WA'},{n:'Albany',s:'WA'},{n:'Kalgoorlie',s:'WA'},
  {n:'Elwick',s:'TAS'},{n:'Mowbray',s:'TAS'},{n:'Spreyton',s:'TAS'},{n:'Devonport',s:'TAS'},
  {n:'Darwin',s:'NT'},{n:'Alice Springs',s:'NT'},
  {n:'Thoroughbred Park',s:'ACT'},
  {n:'Happy Valley',s:'HK'},{n:'Sha Tin',s:'HK'},
];

let venueSelected=null;

function filterVenues(q){
  const drop=document.getElementById('venueDrop');
  const t=q.trim().toLowerCase();
  const list=t.length===0?VENUES.slice(0,24):VENUES.filter(v=>v.n.toLowerCase().includes(t)||v.s.toLowerCase().includes(t));
  drop.innerHTML=list.map(v=>`<div class="venue-option" onmousedown="selectVenue('${v.n.replace(/'/g,"\\'")}','${v.s}')">${v.n}<span class="state-tag">${v.s}</span></div>`).join('')
    +`<div class="venue-option other-opt" onmousedown="selectVenue('OTHER','')">Other (free text)…</div>`;
  drop.classList.add('open');
}

function selectVenue(name,state){
  const inp=document.getElementById('nmVenue');
  const ow=document.getElementById('nmOtherWrap');
  document.getElementById('venueDrop').classList.remove('open');
  if(name==='OTHER'){inp.value='Other';venueSelected=null;ow.style.display='block';setTimeout(()=>document.getElementById('nmVenueOther').focus(),50);}
  else{inp.value=name+' ('+state+')';venueSelected={name,state};ow.style.display='none';}
}

function hideVenueDrop(){setTimeout(()=>document.getElementById('venueDrop').classList.remove('open'),160);}

// ── CONFIG ──────────────────────────────────────────
const PICK_LABELS=['Best Chance','Value Play','Threat'];
const RES_ICON={
  '1st':'🏆','2nd':'🥈','3rd':'🥉','unp':'✗',null:'·'
};
const RES_LABEL={'1st':'1st','2nd':'2nd','3rd':'3rd','unp':'UNP',null:'–'};

// ── STATE ───────────────────────────────────────────
let meetings=lsLoad('so_meetings')||[];
let currentId=null;
let activeTab='today';
let dashView='today'; // 'today' | 'past'

function lsLoad(k){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}}
function lsSave(){
  localStorage.setItem('so_meetings',JSON.stringify(meetings));
  if(gsConnected()) gsSyncAll();
}

function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function meetingCat(m){
  const t=todayStr();
  if(m.date===t)return'today';
  if(m.date>t)return'future';
  return'past';
}

// ── TAB ─────────────────────────────────────────────
function switchTab(tab){
  activeTab=tab;
  ['dash','today','upcoming','past'].forEach(t=>document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===tab));
  if(tab==='dash'){renderDashboard();renderTabTotals();}
  else{renderSidebar();}
}

// ── MEETING CREATION ─────────────────────────────────
function openNewMeeting(){
  document.getElementById('nmDate').valueAsDate=new Date();
  document.getElementById('nmVenue').value='';
  document.getElementById('nmOtherWrap').style.display='none';
  venueSelected=null;
  openModal('modalMeeting');
  setTimeout(()=>document.getElementById('nmVenue').focus(),120);
}

function createMeeting(){
  let vName,vState;
  if(venueSelected){vName=venueSelected.name;vState=venueSelected.state;}
  else if(document.getElementById('nmOtherWrap').style.display!=='none'){
    vName=document.getElementById('nmVenueOther').value.trim();
    vState=document.getElementById('nmStateOther').value;
    if(!vName){toast('Enter a venue name');return;}
  } else{toast('Select a venue from the list');return;}

  const n=parseInt(document.getElementById('nmRaces').value)||8;
  const m={
    id:Date.now(),
    date:document.getElementById('nmDate').value,
    venue:vName,state:vState,gsLoaded:false,
    races:Array.from({length:n},(_,i)=>mkRace(i+1))
  };
  meetings.unshift(m);lsSave();closeModal('modalMeeting');venueSelected=null;
  const cat=meetingCat(m);
  activeTab=cat==='past'?'past':cat==='today'?'today':'upcoming';
  renderSidebar();
  openMeeting(m.id);
  toast('Meeting created');
}

function mkRace(num){
  return{num,name:'',picks:[
    {num:'',horse:'',type:0,result:null},
    {num:'',horse:'',type:1,result:null},
    {num:'',horse:'',type:2,result:null}
  ]};
}

// ── OPEN MEETING ─────────────────────────────────────
async function openMeeting(id){
  currentId=id;
  const m=meetings.find(x=>x.id===id);
  // switch to correct tab
  const cat=meetingCat(m);
  activeTab=cat==='past'?'past':cat==='today'?'today':'upcoming';
  ['dash','today','upcoming','past'].forEach(t=>document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('active',t===activeTab));
  renderSidebar();
  renderMain();
  // for past meetings, try to load from Sheets if connected
  if(m && cat==='past' && !m.gsLoaded && gsConnected()){
    toast('Loading from Sheets…');
    const loaded = await gsLoadMeeting(m);
    if(loaded){ renderMain(); toast('Loaded from Sheets'); }
  }
}

// gsLoadStub removed — real implementation below

// ── SIDEBAR ──────────────────────────────────────────
function renderTabTotals(){
  const today  =meetings.filter(m=>meetingCat(m)==='today');
  const future =meetings.filter(m=>meetingCat(m)==='future');
  const past   =meetings.filter(m=>meetingCat(m)==='past');
  const source = activeTab==='today' ? today : activeTab==='upcoming' ? future : activeTab==='past' ? past : [];

  let wins=0,placed=0,unplaced=0,settled=0;
  source.forEach(m=>{
    const s=meetingStats(m);
    wins+=s.wins; placed+=s.placed; unplaced+=s.unplaced; settled+=s.settled;
  });
  const hitRate=settled>0?Math.round(((wins+placed)/settled)*100):0;

  const el=document.getElementById('tabTotals');
  if(!el)return;

  if(activeTab==='dash'||source.length===0){
    el.style.display='none';
    return;
  }

  // Only show totals if there is at least one settled pick
  const hasAnySettled = source.some(m=>meetingStats(m).settled>0);
  if(!hasAnySettled){
    el.style.display='none';
    return;
  }

  el.style.display='flex';
  el.innerHTML=`
    <div class="tab-total-item">
      <div class="tab-total-val tt-green">${wins}</div>
      <div class="tab-total-lbl">Wins</div>
    </div>
    <div class="tt-divider"></div>
    <div class="tab-total-item">
      <div class="tab-total-val tt-gold">${placed}</div>
      <div class="tab-total-lbl">Placings</div>
    </div>
    <div class="tt-divider"></div>
    <div class="tab-total-item">
      <div class="tab-total-val tt-red">${unplaced}</div>
      <div class="tab-total-lbl">Unplaced</div>
    </div>
    <div class="tt-divider"></div>
    <div class="tab-total-item">
      <div class="tab-total-val tt-navy">${hitRate}%</div>
      <div class="tab-total-lbl">Hit Rate</div>
    </div>`;
}

function renderSidebar(){
  const today  =meetings.filter(m=>meetingCat(m)==='today');
  const future =meetings.filter(m=>meetingCat(m)==='future').sort((a,b)=>a.date.localeCompare(b.date));
  const past   =meetings.filter(m=>meetingCat(m)==='past').sort((a,b)=>b.date.localeCompare(a.date));

  document.getElementById('countToday').textContent=today.length;
  document.getElementById('countUpcoming').textContent=future.length;
  document.getElementById('countPast').textContent=past.length;

  const body=document.getElementById('sidebarBody');

  if(activeTab==='today'){
    if(!today.length){body.innerHTML='<div class="no-meetings">No meetings today.<br>Click <strong>+ New Meeting</strong>.</div>';return;}
    body.innerHTML='<div class="section-label">Today</div>'+today.map(meetingItemHTML).join('');
  } else if(activeTab==='upcoming'){
    if(!future.length){body.innerHTML='<div class="no-meetings">No upcoming meetings.</div>';return;}
    const byDate={};
    future.forEach(m=>{(byDate[m.date]=byDate[m.date]||[]).push(m);});
    let html='<div class="section-label">Upcoming</div>';
    Object.entries(byDate).forEach(([date,ms])=>{
      const lbl=new Date(date+'T12:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
      html+=`<div class="date-group-label">${lbl}</div>`+ms.map(meetingItemHTML).join('');
    });
    body.innerHTML=html;
  } else if(activeTab==='past'){
    if(!past.length){body.innerHTML='<div class="no-meetings">No past meetings yet.</div>';return;}
    const byMonth={};
    past.forEach(m=>{const k=m.date.slice(0,7);(byMonth[k]=byMonth[k]||[]).push(m);});
    let html='';
    Object.entries(byMonth).forEach(([key,ms])=>{
      const [y,mo]=key.split('-');
      const lbl=new Date(y,mo-1).toLocaleDateString('en-AU',{month:'long',year:'numeric'});
      html+=`<div class="section-label">${lbl}</div>`+ms.map(meetingItemHTML).join('');
    });
    body.innerHTML=html;
  }
  renderTabTotals();
}

function meetingItemHTML(m){
  const cat=meetingCat(m);
  const s=meetingStats(m);
  const active=m.id===currentId;
  const d=new Date(m.date+'T12:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  const pct=s.settled>0?Math.round(((s.wins+s.placed)/s.settled)*100):0;
  const barW=Math.min(pct,100);
  return`
    <div class="meeting-item is-${cat}${active?' active':''}" onclick="openMeeting(${m.id})">
      <div class="sb-venue">
        ${esc(m.venue)}<span style="font-size:0.56rem;color:var(--muted);font-family:'DM Mono',monospace">${m.state}</span>
        ${cat==='today'?'<span class="today-pill">Today</span>':''}
      </div>
      <div class="sb-meta">${d} &middot; ${m.races.length} races</div>
      <div class="sb-stats">
        <span class="sb-stat w">${s.wins}W</span>
        <span class="sb-stat p">${s.placed}P</span>
        <span class="sb-stat u">${s.unplaced}U</span>
        <span class="sb-stat pct">${pct}%</span>
      </div>
      <div class="sb-bar"><div class="sb-bar-fill" style="width:${barW}%"></div></div>
      ${cat==='past'?`<div class="gs-indicator"><span class="gs-dot${gsConnected()?" synced":""}"></span>${gsConnected()?'Synced':'Sheets: not connected'}</div>`:''}
    </div>`;
}

// ── MAIN CONTENT ─────────────────────────────────────
function renderMain(){
  const m=meetings.find(x=>x.id===currentId);
  if(!m)return;
  const s=meetingStats(m);
  const cat=meetingCat(m);
  const d=new Date(m.date+'T12:00:00').toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const gsBanner=cat==='past'
    ?`<div class="gs-banner"><span id="gsBannerMsg"><strong>Past meeting.</strong> ${gsConnected()?'Loading from Google Sheets…':'Connect Google Sheets to sync data across devices.'}</span><button class="btn btn-outline btn-sm" onclick="openModal('modalGSheets')">${gsConnected()?'Manage':'Connect'}</button></div>`:'';

  document.getElementById('mainContent').innerHTML=`
    <div class="meeting-header">
      <div>
        <div class="meeting-title">${esc(m.venue)}</div>
        <div class="meeting-subtitle">${d} &middot; ${m.state} &middot; ${m.races.length} races</div>
      </div>
      <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap">
        <button class="btn btn-danger btn-sm" onclick="deleteMeeting(${m.id})">Delete</button>
      </div>
    </div>
    ${gsBanner}
    <div class="summary-bar" id="summaryBar">${summaryBarHTML(s)}</div>
    <div id="racesContainer">${m.races.map((race,ri)=>raceHTML(m.id,race,ri)+mobileRaceHTML(m.id,race,ri)).join('')}</div>
    <div class="add-race-row">
      <button class="btn btn-ghost btn-sm" onclick="addRace()">+ Add Race</button>
    </div>
  `;
}

function summaryBarHTML(s){
  return`
    <div class="summary-chip"><div class="chip-val chip-navy">${s.total}</div><div class="chip-label">Picks</div></div>
    <div class="summary-chip"><div class="chip-val chip-green">${s.wins}</div><div class="chip-label">Wins</div></div>
    <div class="summary-chip"><div class="chip-val chip-gold">${s.placed}</div><div class="chip-label">Placings</div></div>
    <div class="summary-chip"><div class="chip-val chip-red">${s.unplaced}</div><div class="chip-label">Unplaced</div></div>
    <div class="summary-chip"><div class="chip-val chip-navy">${s.hitRate}%</div><div class="chip-label">Hit Rate</div></div>`;
}

function raceHTML(mid,race,ri){
  const hasAny=race.picks.some(p=>p.num||p.horse);
  const allSettled=race.picks.filter(p=>p.num||p.horse).every(p=>p.result);
  const showBadge=hasAny&&allSettled;
  const rows=race.picks.map((pick,pi)=>{

// ── DRAWER ───────────────────────────────────────────
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('drawerOverlay').classList.add('open');renderDrawer();}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('drawerOverlay').classList.remove('open');}
function drawerTab(tab){
  activeTab=tab;
  ['Dash','Today','Upcoming','Past'].forEach(t=>{const el=document.getElementById('tab'+t);if(el)el.classList.toggle('active',t.toLowerCase()===tab);});
  ['dash','today','upcoming','past'].forEach(t=>{const el=document.getElementById('dtab'+t.charAt(0).toUpperCase()+t.slice(1));if(el)el.classList.toggle('active',t===tab);});
  if(tab==='dash'){renderDashboard();closeDrawer();}else{renderDrawer();}
}
function renderDrawer(){
  const today=meetings.filter(m=>meetingCat(m)==='today');
  const future=meetings.filter(m=>meetingCat(m)==='future');
  const past=meetings.filter(m=>meetingCat(m)==='past');
  document.getElementById('dcountToday').textContent=today.length;
  document.getElementById('dcountUpcoming').textContent=future.length;
  document.getElementById('dcountPast').textContent=past.length;
  const body=document.getElementById('drawerBody');
  let html='';
  if(activeTab==='today'){
    html=!today.length?'<div class="no-meetings">No meetings today.</div>':'<div class="section-label">Today</div>'+today.map(drawerItem).join('');
  }else if(activeTab==='upcoming'){
    if(!future.length){html='<div class="no-meetings">No upcoming meetings.</div>';}
    else{const byDate={};future.sort((a,b)=>a.date.localeCompare(b.date)).forEach(m=>{(byDate[m.date]=byDate[m.date]||[]).push(m);});html='<div class="section-label">Upcoming</div>';Object.entries(byDate).forEach(([date,ms])=>{const lbl=new Date(date+'T12:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});html+=`<div class="date-group-label">${lbl}</div>`+ms.map(drawerItem).join('');});}
  }else if(activeTab==='past'){
    if(!past.length){html='<div class="no-meetings">No past meetings yet.</div>';}
    else{const byMonth={};past.sort((a,b)=>b.date.localeCompare(a.date)).forEach(m=>{const k=m.date.slice(0,7);(byMonth[k]=byMonth[k]||[]).push(m);});Object.entries(byMonth).forEach(([key,ms])=>{const[y,mo]=key.split('-');const lbl=new Date(y,mo-1).toLocaleDateString('en-AU',{month:'long',year:'numeric'});html+=`<div class="section-label">${lbl}</div>`+ms.map(drawerItem).join('');});}
  }
  body.innerHTML=html;
  renderDrawerTotals();
}
function drawerItem(m){
  const cat=meetingCat(m),s=meetingStats(m),active=m.id===currentId;
  const d=new Date(m.date+'T12:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});
  const pct=s.settled>0?Math.round(((s.wins+s.placed)/s.settled)*100):0;
  return`<div class="meeting-item is-${cat}${active?' active':''}" onclick="openMeeting(${m.id});closeDrawer()">
    <div class="sb-venue">${esc(m.venue)}<span style="font-size:0.56rem;color:var(--muted);font-family:'DM Mono',monospace">${m.state}</span>${cat==='today'?'<span class="today-pill">Today</span>':''}</div>
    <div class="sb-meta">${d} &middot; ${m.races.length} races</div>
    <div class="sb-stats"><span class="sb-stat w">${s.wins}W</span><span class="sb-stat p">${s.placed}P</span><span class="sb-stat u">${s.unplaced}U</span><span class="sb-stat pct">${pct}%</span></div>
    <div class="sb-bar"><div class="sb-bar-fill" style="width:${Math.min(pct,100)}%"></div></div>
  </div>`;
}
function renderDrawerTotals(){
  const today=meetings.filter(m=>meetingCat(m)==='today');
  const future=meetings.filter(m=>meetingCat(m)==='future');
  const past=meetings.filter(m=>meetingCat(m)==='past');
  const source=activeTab==='today'?today:activeTab==='upcoming'?future:activeTab==='past'?past:[];
  const el=document.getElementById('drawerTotals');if(!el)return;
  if(!source.length||activeTab==='dash'){el.style.display='none';return;}
  let w=0,p=0,u=0,s=0;
  source.forEach(m=>{const st=meetingStats(m);w+=st.wins;p+=st.placed;u+=st.unplaced;s+=st.settled;});
  if(!source.some(m=>meetingStats(m).settled>0)){el.style.display='none';return;}
  const h=s>0?Math.round(((w+p)/s)*100):0;
  el.style.display='flex';
  el.innerHTML=`<div class="tab-total-item"><div class="tab-total-val tt-green">${w}</div><div class="tab-total-lbl">Wins</div></div><div class="tt-divider"></div><div class="tab-total-item"><div class="tab-total-val tt-gold">${p}</div><div class="tab-total-lbl">Placings</div></div><div class="tt-divider"></div><div class="tab-total-item"><div class="tab-total-val tt-red">${u}</div><div class="tab-total-lbl">Unplaced</div></div><div class="tt-divider"></div><div class="tab-total-item"><div class="tab-total-val tt-navy">${h}%</div><div class="tab-total-lbl">Hit Rate</div></div>`;
}
function renderDashboard(){
  const main=document.getElementById('mainContent');
  const todayMeetings=meetings.filter(m=>meetingCat(m)==='today');
  const pastMeetings =meetings.filter(m=>meetingCat(m)==='past').sort((a,b)=>b.date.localeCompare(a.date));
  const source=dashView==='today'?todayMeetings:pastMeetings;

  // Aggregate stats across all shown meetings
  let totPicks=0,totWins=0,totPlaced=0,totUnp=0,totSettled=0;
  source.forEach(m=>{
    const s=meetingStats(m);
    totPicks+=s.total;totWins+=s.wins;totPlaced+=s.placed;totUnp+=s.unplaced;totSettled+=s.settled;
  });
  const totHit=totSettled>0?Math.round(((totWins+totPlaced)/totSettled)*100):0;

  const today=new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  main.innerHTML=`
    <div class="dash-header">
      <div>
        <div class="dash-title">Dashboard</div>
        <div class="dash-date">${dashView==='today'?today:'All past meetings'}</div>
      </div>
      <div class="dash-toggle">
        <button class="dash-toggle-btn ${dashView==='today'?'active':''}" onclick="setDashView('today')">Today</button>
        <button class="dash-toggle-btn ${dashView==='past'?'active':''}" onclick="setDashView('past')">Past</button>
      </div>
    </div>

    <div class="dash-stats">
      <div class="dash-chip"><div class="dash-chip-val chip-navy">${source.length}</div><div class="dash-chip-lbl">Meetings</div></div>
      <div class="dash-chip"><div class="dash-chip-val chip-navy">${totPicks}</div><div class="dash-chip-lbl">Picks</div></div>
      <div class="dash-chip"><div class="dash-chip-val chip-green">${totWins}</div><div class="dash-chip-lbl">Wins</div></div>
      <div class="dash-chip"><div class="dash-chip-val chip-gold">${totPlaced}</div><div class="dash-chip-lbl">Placings</div></div>
      <div class="dash-chip"><div class="dash-chip-val chip-red">${totUnp}</div><div class="dash-chip-lbl">Unplaced</div></div>
      <div class="dash-chip"><div class="dash-chip-val ${totHit>=50?'chip-green':totHit>=30?'chip-gold':'chip-red'}">${totHit}%</div><div class="dash-chip-lbl">Hit Rate</div></div>
    </div>

    ${!source.length
      ?`<div class="empty-state" style="height:40vh"><div class="empty-icon">${dashView==='today'?'📅':'📋'}</div><div class="empty-title">${dashView==='today'?'No meetings today':'No past meetings'}</div><div class="empty-sub">${dashView==='today'?'Create a meeting for today to see tips here.':'Past results will appear here.'}</div></div>`
      :source.map(m=>dashMeetingCard(m)).join('')
    }
  `;
}

function dashMeetingCard(m){
  const s=meetingStats(m);
  const pct=s.settled>0?Math.round(((s.wins+s.placed)/s.settled)*100):0;
  const d=new Date(m.date+'T12:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'});

  const raceRows=m.races.map((race,ri)=>{
    const hasPicks=race.picks.some(p=>p.num||p.horse);
    if(!hasPicks)return'';
    const chips=race.picks.map((pick,pi)=>{
      if(!pick.num&&!pick.horse)return'';
      const res=pick.result;
      const icon=res==='1st'?'🏆':res==='2nd'?'🥈':res==='3rd'?'🥉':res==='unp'?'✗':'·';
      const cls=res?`res-${res}`:'pending';
      const label=pick.num||(pick.horse?pick.horse.split(' ')[0]:'');
      const typeShort=pi===0?'BC':pi===1?'VP':'T';
      return`<span class="pick-chip ${cls}" title="${PICK_LABELS[pi]}: ${pick.horse||''}">
        <span class="pick-icon">${icon}</span>
        <span class="pick-label">${typeShort} ${esc(label)}</span>
      </span>`;
    }).join('');
    const raceName=race.name?` &middot; ${esc(race.name)}`:'';
    return`<div class="dash-race-row">
      <div class="dash-race-num">${race.num}</div>
      <div>
        <div class="dash-race-name">Race ${race.num}${raceName}</div>
        <div class="dash-picks-row">${chips}</div>
      </div>
    </div>`;
  }).join('');

  return`
    <div class="dash-meeting-card">
      <div class="dash-card-head" onclick="openMeeting(${m.id})">
        <div>
          <div class="dash-card-venue">${esc(m.venue)} <span style="font-size:0.65rem;color:rgba(255,255,255,0.4)">${m.state}</span></div>
          <div class="dash-card-meta">${d} &middot; ${s.settled}/${s.total} settled</div>
        </div>
        <div>
          <div class="dash-card-score">${pct}%</div>
          <div class="dash-card-score-lbl">${s.wins}W ${s.placed}P ${s.unplaced}U</div>
        </div>
      </div>
      ${raceRows}
    </div>`;
}

function setDashView(v){
  dashView=v;
  renderDashboard();
}

function updatePick(mid,ri,pi,field,val){
  const m=meetings.find(x=>x.id===mid);if(!m)return;
  m.races[ri].picks[pi][field]=val.trim();lsSave();
  const bar=document.getElementById('summaryBar');
  if(bar)bar.innerHTML=summaryBarHTML(meetingStats(m));
  renderSidebar();
}

function updateRaceName(mid,ri,val){
  const m=meetings.find(x=>x.id===mid);if(!m)return;
  m.races[ri].name=val.trim();lsSave();
}

function setResult(mid,ri,pi,result){
  const m=meetings.find(x=>x.id===mid);if(!m)return;
  m.races[ri].picks[pi].result=result;lsSave();
  // refresh desktop block
  const block=document.getElementById('race-'+ri);
  if(block)block.outerHTML=raceHTML(mid,m.races[ri],ri);
  // refresh mobile block
  const mblock=document.getElementById('mrace-'+ri);
  if(mblock)mblock.outerHTML=mobileRaceHTML(mid,m.races[ri],ri);
  const bar=document.getElementById('summaryBar');
  if(bar)bar.innerHTML=summaryBarHTML(meetingStats(m));
  renderSidebar();
}

function addRace(){
  const m=meetings.find(x=>x.id===currentId);if(!m)return;
  m.races.push(mkRace(m.races.length+1));
  lsSave();
  const container=document.getElementById('racesContainer');
  if(container){
    const ri=m.races.length-1;
    const div=document.createElement('div');
    div.innerHTML=raceHTML(m.id,m.races[ri],ri)+mobileRaceHTML(m.id,m.races[ri],ri);
    while(div.firstElementChild) container.appendChild(div.firstElementChild);
  }
  toast('Race '+(m.races.length)+' added');
}

function deleteMeeting(id){
  if(!confirm('Delete this meeting?'))return;
  meetings=meetings.filter(m=>m.id!==id);currentId=null;lsSave();
  renderSidebar();
  document.getElementById('mainContent').innerHTML=`
    <div class="empty-state">
      <div class="empty-icon">🏇</div>
      <div class="empty-title">No meeting selected</div>
      <div class="empty-sub">Select a meeting or create a new one.</div>
      <br><button class="btn btn-primary" onclick="openNewMeeting()">+ New Meeting</button>
    </div>`;
  toast('Meeting deleted');
}

// ── STATS ────────────────────────────────────────────
function meetingStats(m){
  const all=m.races.flatMap(r=>r.picks).filter(p=>p.num||p.horse);
  const settled=all.filter(p=>p.result);
  const wins=all.filter(p=>p.result==='1st').length;
  const placed=all.filter(p=>p.result==='2nd'||p.result==='3rd').length;
  const unplaced=all.filter(p=>p.result==='unp').length;
  const hitRate=settled.length>0?Math.round(((wins+placed)/settled.length)*100):0;
  return{total:all.length,settled:settled.length,wins,placed,unplaced,hitRate};
}

const GS_CLIENT_ID = '793391747991-ht9mpmm9sro35cea1djmhi0fa6qa0jrj.apps.googleusercontent.com';
const GS_SCOPE     = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';
const GS_SHEET_NAME = 'SO Racing Tips';

let gsAccessToken  = null;
let gsTokenExpiry  = 0;

let gsUserEmail    = lsLoad('so_gs_email') || null;
let gsTokenClient  = null;

function gsConnected() {

function gsUpdateStatus() {
  const el  = document.getElementById('gsStatus');

    if (dtxt) dtxt.textContent = 'Setting up Google Sheets…';
  } else {
    if (el) el.className = 'gs-status';

// ── INIT OAUTH ───────────────────────────────────────
function gsInitClient() {
  if (!window.google || !window.google.accounts) {
    toast('Google library not loaded — check internet connection');
    return;
  }
  if (!GS_CLIENT_ID || GS_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID_HERE') {
    toast('Paste your Google Client ID into the app first');
    renderGSModal();
    return;
  }
  gsTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GS_CLIENT_ID,
    scope: GS_SCOPE,
    callback: gsHandleToken,
  });
  gsTokenClient.requestAccessToken();
}

function gsHandleToken(resp) {
  if (resp.error) { toast('Sign-in failed: ' + resp.error); return; }
  gsAccessToken = resp.access_token;
  gsTokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
  // get user info
  fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
    headers: { Authorization: 'Bearer ' + gsAccessToken }
  }).then(r => r.json()).then(info => {
    gsUserEmail = info.email;
    localStorage.setItem('so_gs_email', JSON.stringify(gsUserEmail));
    gsUpdateStatus();
  });
  gsEnsureSheet().then(() => {
    gsUpdateStatus();
    renderGSModal();
    gsSyncAll();
    toast('Connected to Google Sheets');
  }).catch(e => {
    toast('Sheet setup failed: ' + e.message);
  });
}

// ── ENSURE SPREADSHEET EXISTS ────────────────────────
async function gsEnsureSheet() {
  if (gsSpreadsheetId) {
    // verify it still exists
    try {
      const r = await gsFetch(`https://sheets.googleapis.com/v4/spreadsheets/${gsSpreadsheetId}?fields=spreadsheetId`);
      return; // exists
    } catch(e) {
      gsSpreadsheetId = null;
      localStorage.removeItem('so_gs_sheet_id');
    }
  }
  // create new spreadsheet
  const body = {
    properties: { title: GS_SHEET_NAME },
    sheets: [{ properties: { title: 'Meetings' } }, { properties: { title: 'Picks' } }]
  };
  const r = await gsFetch('https://sheets.googleapis.com/v4/spreadsheets', 'POST', body);
  gsSpreadsheetId = r.spreadsheetId;
  localStorage.setItem('so_gs_sheet_id', JSON.stringify(gsSpreadsheetId));
  // write headers
  await gsWriteHeaders();
}

async function gsWriteHeaders() {
  const meetingHeaders = [['id','date','venue','state']];
  const pickHeaders    = [['meetingId','raceNum','raceName','pickType','horseNum','horseName','result']];
  await gsBatchUpdate([
    { range: 'Meetings!A1:D1', values: meetingHeaders },
    { range: 'Picks!A1:G1',    values: pickHeaders    }
  ]);
}

// ── SYNC ALL LOCAL MEETINGS TO SHEET ─────────────────
async function gsSyncAll() {
  if (!gsConnected()) return;
  try {
    // Clear and rewrite Meetings tab
    const mRows = [['id','date','venue','state']];
    meetings.forEach(m => mRows.push([m.id, m.date, m.venue, m.state]));

    // Clear and rewrite Picks tab
    const pRows = [['meetingId','raceNum','raceName','pickType','horseNum','horseName','result']];
    meetings.forEach(m => {
      m.races.forEach(race => {
        race.picks.forEach((pick, pi) => {
          pRows.push([m.id, race.num, race.name||'', PICK_LABELS[pi], pick.num||'', pick.horse||'', pick.result||'']);
        });
      });
    });

    await gsFetch(`https://sheets.googleapis.com/v4/spreadsheets/${gsSpreadsheetId}/values:batchClear`, 'POST',
      { ranges: ['Meetings!A1:Z10000', 'Picks!A1:Z100000'] });

    await gsBatchUpdate([
      { range: 'Meetings!A1', values: mRows },
      { range: 'Picks!A1',    values: pRows }
    ]);
  } catch(e) {
    console.warn('GSheets sync error:', e.message);
  }
}

// ── LOAD A SPECIFIC MEETING FROM SHEET ───────────────
async function gsLoadMeeting(m) {
  if (!gsConnected()) return false;
  try {
    const resp = await gsFetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${gsSpreadsheetId}/values/Picks!A1:G100000`
    );
    const rows = (resp.values || []).slice(1); // skip header
    const myRows = rows.filter(r => String(r[0]) === String(m.id));
    if (!myRows.length) return false;

    // Rebuild races from sheet rows
    const raceMap = {};
    myRows.forEach(r => {
      const raceNum = parseInt(r[1]);
      if (!raceMap[raceNum]) raceMap[raceNum] = { num: raceNum, name: r[2]||'', picks: [] };
      raceMap[raceNum].picks.push({
        num:   r[4]||'',
        horse: r[5]||'',
        type:  PICK_LABELS.indexOf(r[3]),
        result: r[6]||null
      });
    });

    // Sort and assign
    m.races = Object.values(raceMap).sort((a,b) => a.num - b.num);
    m.races.forEach(race => {
      // ensure exactly 3 picks in correct order
      const ordered = [null, null, null];
      race.picks.forEach(p => { if (p.type >= 0 && p.type < 3) ordered[p.type] = p; });
      race.picks = ordered.map((p, i) => p || { num:'', horse:'', type:i, result:null });
    });

    m.gsLoaded = true;
    lsSave();
    return true;
  } catch(e) {
    console.warn('GSheets load error:', e.message);
    return false;
  }
}

// ── FETCH HELPER ─────────────────────────────────────
async function gsFetch(url, method='GET', body=null) {
  if (!gsAccessToken) throw new Error('Not authenticated');
  const opts = {
    method,
    headers: {
      'Authorization': 'Bearer ' + gsAccessToken,
      'Content-Type': 'application/json'
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) {
    const err = await r.json().catch(() => ({}));
    throw new Error(err.error?.message || r.statusText);
  }
  return r.json();
}

async function gsBatchUpdate(data) {
  return gsFetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${gsSpreadsheetId}/values:batchUpdate`,
    'POST',
    { valueInputOption: 'RAW', data }
  );
}

// ── SIGN OUT ─────────────────────────────────────────
function gsSignOut() {
  if (gsAccessToken && window.google) {
    google.accounts.oauth2.revoke(gsAccessToken);
  }
  gsAccessToken   = null;
  gsTokenExpiry   = 0;
  gsSpreadsheetId = null;
  gsUserEmail     = null;
  localStorage.removeItem('so_gs_sheet_id');
  localStorage.removeItem('so_gs_email');
  gsUpdateStatus();
  renderGSModal();
  toast('Disconnected from Google Sheets');
}

// ── AUTO-RESTORE SESSION ─────────────────────────────
// Token doesn't persist across page loads (Google's design)
// User needs to re-auth each session — but Sheet ID is remembered
// so re-auth is one tap, no setup required again
function gsRestoreSession() {
  gsUpdateStatus();
  if (!GS_CLIENT_ID || GS_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID_HERE') return;

  // Attempt silent token — works if user has active Google session in browser
  // prompt:'' means no UI shown, fails silently if no session
  gsTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GS_CLIENT_ID,
    scope: GS_SCOPE,
    prompt: '',
    callback: (resp) => {
      if (resp.error) {
        // Silent auth failed — user will need to tap Connect manually
        gsUpdateStatus();
        return;
      }
      gsAccessToken = resp.access_token;
      gsTokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
      // Get user email
      fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
        headers: { Authorization: 'Bearer ' + gsAccessToken }
      }).then(r => r.json()).then(info => {
        gsUserEmail = info.email;
        localStorage.setItem('so_gs_email', JSON.stringify(gsUserEmail));
        gsUpdateStatus();
        renderGSModal();
      }).catch(() => gsUpdateStatus());
      // If no sheet yet, create one
      if (!gsSpreadsheetId) {
        gsEnsureSheet().then(() => {
          gsUpdateStatus();
          gsSyncAll();
        }).catch(() => {});
      } else {
        gsUpdateStatus();
      }
    }
  });
  gsTokenClient.requestAccessToken();
}

// ── INIT ─────────────────────────────────────────────
// Wait for Google Identity Services to be ready then attempt silent auth
function gsWaitAndRestore() {
  if (window.google && window.google.accounts && window.google.accounts.oauth2) {
    gsRestoreSession();
  } else {
    // Library not ready yet — retry every 200ms for up to 5 seconds
    let attempts = 0;
    const interval = setInterval(() => {
      attempts++;
      if (window.google && window.google.accounts && window.google.accounts.oauth2) {
        clearInterval(interval);
        gsRestoreSession();
      } else if (attempts > 25) {
        clearInterval(interval); // give up after 5s
      }
    }, 200);
  }
}
